<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FreelanceHub</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <h1>FreelanceHub</h1>
    <div>
      <button onclick="showPage('home')">Home</button>
      <button onclick="showPage('services')">Services</button>
      <button onclick="showPage('dashboard')">Dashboard</button>
    </div>
  </nav>

  <!-- HOME PAGE -->
  <div id="home" class="page">
    <div class="hero">
      <h2>Find the Best Freelancers</h2>
      <p>Browse services, save favorites, and hire talent.</p>
      <button onclick="showPage('services')">Browse Services</button>
    </div>
  </div>

  <!-- SERVICES PAGE -->
  <div id="services" class="page hidden">
    <h2>All Services</h2>

    <!-- Search & Filter -->
    <div class="filters">
      <input type="text" id="search" placeholder="Search by title..." oninput="applyFilters()" />
      <select id="category" onchange="applyFilters()">
        <option value="">All Categories</option>
        <option value="Design">Design</option>
        <option value="Web Dev">Web Dev</option>
        <option value="Writing">Writing</option>
        <option value="Marketing">Marketing</option>
        <option value="Video">Video</option>
      </select>
      <select id="sort" onchange="applyFilters()">
        <option value="">Sort By</option>
        <option value="price-low">Price: Low to High</option>
        <option value="price-high">Price: High to Low</option>
        <option value="rating">Rating</option>
      </select>
    </div>

    <!-- Drop Zone -->
    <div id="dropzone" ondragover="event.preventDefault()" ondrop="onDrop(event)">
      Drop a service card here to Save it
    </div>

    <!-- Cards -->
    <div id="cards" class="grid"></div>
  </div>

  <!-- DASHBOARD PAGE -->
  <div id="dashboard" class="page hidden">
    <h2>My Dashboard</h2>
    <h3>Saved Services</h3>
    <div id="saved-list" class="grid"></div>
    <h3>Hired Services</h3>
    <div id="hired-list" class="grid"></div>
  </div>

  <!-- MODAL -->
  <div id="modal" class="modal hidden">
    <div class="modal-box">
      <button class="close" onclick="closeModal()">X</button>
      <div id="modal-content"></div>
      <div class="modal-buttons">
        <button id="save-btn">Save</button>
        <button id="hire-btn">Hire</button>
      </div>
    </div>
  </div>

 <script src="js/app.js"></script>
</body>
</html>
